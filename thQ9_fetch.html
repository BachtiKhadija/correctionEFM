<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <table><thead><tr><th>ID</th>
    <th>NAME</th>
    <th>EMAIL/th></tr></thead><tbody id="content"></tbody></table>
    <button type="button" id="send">Envoyer</button>
    <script type="text/javascript">
        //question5 
        let k=""+5+4;//54
        let users=[];
        document.querySelector('#send').onclick=function(e){
           fetch('https://jsonplaceholder.typicode.com/users').then(res=>res.json()).then(data=>{
            users=data;

            display();
           })
            





        }

        const display=()=>{
            document.querySelector('#content').innerHTML=users.map(u=>`<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td></tr>`).join('');

        }


    </script>
</body>
</html>
